version: '3.9'
services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: chroma_server
    ports:
      - "8000:8000"
    volumes:
      # This ensures your PDF data survives if the container restarts
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: always
    networks:
      - docker-network

  chromadb-admin:
    image: fengzhichao/chromadb-admin:latest
    container_name: chromadb_admin
    depends_on:
      - chromadb
    ports:
      - "3001:3001"
    environment:
      - CHROMA_SERVER_URL=http://chromadb:8000
    networks:
      - docker-network

  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - docker-network
    restart: always

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ollama_pull
    depends_on:
      - ollama
    entrypoint: >
      sh -c "sleep 5 && ollama pull llama3.2"
    environment:
      - OLLAMA_HOST=ollama:11434
    networks:
      - docker-network
    restart: "no"

  postgres:
    image: postgres:16
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docker-network

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - docker-network
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-ui:
    image: redisinsight/redisinsight:latest
    container_name: redis_ui
    depends_on:
      - redis
    ports:
      - "5540:5540"
    networks:
      - docker-network
    restart: always

networks:
  docker-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  redis_data:
  file_storage:  # persistent file storage for uploads and responses